<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <title>Business Card</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white: #ffffff;
      --off-white: #f7f5f2;
      --cream: #f0ece4;
      --ink: #1a1a1a;
      --ink-light: #555;
      --ink-muted: #999;
      --accent: #c8a96e;
      --accent-light: #e8d9b8;
      --border: #e5e0d8;
      --shadow: 0 8px 40px rgba(0,0,0,0.08);
      --radius: 20px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--off-white);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 16px 40px;
      background-image: radial-gradient(circle at 20% 20%, rgba(200,169,110,0.06) 0%, transparent 60%),
                        radial-gradient(circle at 80% 80%, rgba(200,169,110,0.04) 0%, transparent 50%);
    }

    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 420px;
      overflow: hidden;
      animation: rise 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* HEADER */
    .card-header {
      background: var(--ink);
      padding: 36px 28px 28px;
      position: relative;
      display: flex;
      align-items: flex-end;
      gap: 20px;
    }

    .card-header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    /* PHOTO */
    .photo-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .photo-circle {
      width: 88px;
      height: 88px;
      border-radius: 16px;
      background: var(--ink-light);
      border: 2.5px solid var(--accent);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .photo-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .photo-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: var(--ink-muted);
    }

    .photo-placeholder svg { opacity: 0.5; }
    .photo-placeholder span { font-size: 9px; letter-spacing: 0.05em; opacity: 0.6; }

    .photo-edit-btn {
      position: absolute;
      bottom: -6px;
      right: -6px;
      width: 24px;
      height: 24px;
      background: var(--accent);
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 2px solid var(--ink);
    }

    .edit-mode .photo-edit-btn { display: flex; }

    #photo-input { display: none; }

    /* NAME & OCCUPATION */
    .header-text { flex: 1; min-width: 0; }

    .field-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 600;
      color: var(--white);
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .field-occupation {
      font-size: 12px;
      font-weight: 400;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 6px;
    }

    /* EDIT INPUTS IN HEADER */
    .edit-input {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(200,169,110,0.4);
      border-radius: 8px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 8px 12px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
      display: none;
    }

    .edit-input:focus { border-color: var(--accent); }
    .edit-input.name-input { font-family: 'Cormorant Garamond', serif; font-size: 20px; }
    .edit-input.occ-input { color: var(--accent); font-size: 12px; letter-spacing: 0.1em; }

    /* BODY */
    .card-body {
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .field-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      animation: fadeIn 0.4s ease both;
    }

    .field-row:last-child { border-bottom: none; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-8px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .field-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .field-icon svg { color: var(--accent); }

    .field-content { flex: 1; min-width: 0; }

    .field-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 3px;
    }

    .field-value {
      font-size: 15px;
      color: var(--ink);
      line-height: 1.5;
      word-break: break-word;
    }

    .field-value.empty { color: var(--ink-muted); font-style: italic; font-size: 13px; }

    .field-input {
      width: 100%;
      border: none;
      border-bottom: 1.5px solid var(--accent-light);
      padding: 4px 0;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--ink);
      background: transparent;
      outline: none;
      display: none;
      transition: border-color 0.2s;
    }

    .field-input:focus { border-color: var(--accent); }

    textarea.field-input {
      resize: none;
      min-height: 80px;
      line-height: 1.6;
    }

    /* TOGGLE BUTTON */
    .toggle-wrap {
      padding: 20px 28px 28px;
      display: flex;
      justify-content: center;
    }

    .toggle-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.04em;
      transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .toggle-btn.view-mode {
      background: var(--ink);
      color: var(--white);
    }

    .toggle-btn.edit-mode-btn {
      background: var(--accent);
      color: var(--ink);
    }

    .toggle-btn:active { transform: scale(0.96); }

    /* SAVED TOAST */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--ink);
      color: var(--white);
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 13px;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* EDIT MODE STATES */
    .edit-mode .field-value { display: none; }
    .edit-mode .field-input { display: block; }
    .edit-mode .field-name { display: none; }
    .edit-mode .field-occupation { display: none; }
    .edit-mode .name-input { display: block; }
    .edit-mode .occ-input { display: block; margin-top: 6px; }
  </style>
</head>
<body>

<div class="card" id="card">
  <div class="card-header">
    <div class="photo-wrap">
      <div class="photo-circle" id="photoCircle">
        <div class="photo-placeholder" id="photoPlaceholder">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <span>ADD PHOTO</span>
        </div>
        <img id="photoImg" src="" alt="Profile" style="display:none;">
      </div>
      <div class="photo-edit-btn" id="photoEditBtn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </div>
      <input type="file" id="photo-input" accept="image/*">
    </div>

    <div class="header-text">
      <div class="field-name" id="display-name">Your Name</div>
      <div class="field-occupation" id="display-occupation">Your Occupation</div>
      <input class="edit-input name-input" id="input-name" type="text" placeholder="Full Name">
      <input class="edit-input occ-input" id="input-occupation" type="text" placeholder="Occupation / Title">
    </div>
  </div>

  <div class="card-body">
    <div class="field-row" style="animation-delay:0.05s">
      <div class="field-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13.4 19.79 19.79 0 0 1 1.61 4.84 2 2 0 0 1 3.6 2.64h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 10.1a16 16 0 0 0 6 6l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.46 17.4z"/>
        </svg>
      </div>
      <div class="field-content">
        <div class="field-label">Phone</div>
        <div class="field-value empty" id="display-phone">Not set</div>
        <input class="field-input" id="input-phone" type="tel" placeholder="Phone number">
      </div>
    </div>

    <div class="field-row" style="animation-delay:0.1s">
      <div class="field-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
      </div>
      <div class="field-content">
        <div class="field-label">Email</div>
        <div class="field-value empty" id="display-email">Not set</div>
        <input class="field-input" id="input-email" type="email" placeholder="Email address">
      </div>
    </div>

    <div class="field-row" style="animation-delay:0.15s">
      <div class="field-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
      </div>
      <div class="field-content">
        <div class="field-label">Address</div>
        <div class="field-value empty" id="display-address">Not set</div>
        <textarea class="field-input" id="input-address" placeholder="Street, City, State, ZIP"></textarea>
      </div>
    </div>

    <div class="field-row" style="animation-delay:0.2s">
      <div class="field-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      <div class="field-content">
        <div class="field-label">Bio</div>
        <div class="field-value empty" id="display-bio">Not set</div>
        <textarea class="field-input" id="input-bio" placeholder="A short bio about yourself..."></textarea>
      </div>
    </div>
  </div>

  <div class="toggle-wrap">
    <button class="toggle-btn view-mode" id="toggleBtn" onclick="toggleMode()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
      Edit Card
    </button>
  </div>
</div>

<div class="toast" id="toast">✓ Card saved</div>

<script>
  let isEditing = false;

  const fields = [
    { id: 'name', display: 'display-name', input: 'input-name', defaultText: 'Your Name', isHeader: true },
    { id: 'occupation', display: 'display-occupation', input: 'input-occupation', defaultText: 'Your Occupation', isHeader: true },
    { id: 'phone', display: 'display-phone', input: 'input-phone' },
    { id: 'email', display: 'display-email', input: 'input-email' },
    { id: 'address', display: 'display-address', input: 'input-address' },
    { id: 'bio', display: 'display-bio', input: 'input-bio' },
  ];

  // Load saved data
  function loadData() {
    fields.forEach(f => {
      const saved = localStorage.getItem('bc_' + f.id);
      if (saved) {
        document.getElementById(f.display).textContent = saved;
        document.getElementById(f.display).classList.remove('empty');
        document.getElementById(f.input).value = saved;
      }
    });

    const photo = localStorage.getItem('bc_photo');
    if (photo) {
      document.getElementById('photoImg').src = photo;
      document.getElementById('photoImg').style.display = 'block';
      document.getElementById('photoPlaceholder').style.display = 'none';
    }
  }

  function saveData() {
    fields.forEach(f => {
      const val = document.getElementById(f.input).value.trim();
      if (val) {
        localStorage.setItem('bc_' + f.id, val);
        document.getElementById(f.display).textContent = val;
        document.getElementById(f.display).classList.remove('empty');
      } else {
        localStorage.removeItem('bc_' + f.id);
        document.getElementById(f.display).textContent = f.defaultText || 'Not set';
        document.getElementById(f.display).classList.add('empty');
      }
    });
  }

  function toggleMode() {
    isEditing = !isEditing;
    const card = document.getElementById('card');
    const btn = document.getElementById('toggleBtn');

    if (isEditing) {
      card.classList.add('edit-mode');
      btn.classList.remove('view-mode');
      btn.classList.add('edit-mode-btn');
      btn.innerHTML = `
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Save Card`;
    } else {
      saveData();
      card.classList.remove('edit-mode');
      btn.classList.add('view-mode');
      btn.classList.remove('edit-mode-btn');
      btn.innerHTML = `
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
        Edit Card`;
      showToast();
    }
  }

  function showToast() {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  // Photo upload
  document.getElementById('photoCircle').addEventListener('click', () => {
    if (isEditing) document.getElementById('photo-input').click();
  });

  document.getElementById('photoEditBtn').addEventListener('click', () => {
    document.getElementById('photo-input').click();
  });

  document.getElementById('photo-input').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const data = ev.target.result;
      localStorage.setItem('bc_photo', data);
      document.getElementById('photoImg').src = data;
      document.getElementById('photoImg').style.display = 'block';
      document.getElementById('photoPlaceholder').style.display = 'none';
    };
    reader.readAsDataURL(file);
  });

  loadData();
</script>
</body>
</html>
